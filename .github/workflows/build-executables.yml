name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tfm_assigner-linux
            binary_path: dist/tfm_assigner
          - os: macos-latest
            artifact_name: tfm_assigner-macos
            binary_path: dist/tfm_assigner
          - os: windows-latest
            artifact_name: tfm_assigner-windows
            binary_path: dist/tfm_assigner.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build one-file executable
        run: |
          pyinstaller --clean --noconfirm --onefile --name tfm_assigner tfm_folders.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
